<!doctype html>
<meta charset="utf-8">
<style>body{margin:0}</style>
<svg width="2400" height="1300" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1200" height="650" fill="#fbfaf7"/>

  <!-- title -->
  <text x="600" y="52" text-anchor="middle" font-size="30" font-weight="bold" fill="#15202b">ML Compass over MCP — the agent asks the rules engine</text>
  <text x="600" y="82" text-anchor="middle" font-size="16" fill="#445566">rules decide · the agent only narrates</text>

  <!-- your machine boundary -->
  <rect x="360" y="120" width="800" height="380" rx="18" fill="#ffffff" stroke="#c77400" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="380" y="150" font-size="15" font-weight="bold" fill="#c77400">YOUR MACHINE — raw data never leaves</text>

  <!-- you -->
  <rect x="40" y="200" width="130" height="90" rx="14" fill="#ffffff" stroke="#e3e1da" stroke-width="2"/>
  <circle cx="105" cy="232" r="14" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
  <path d="M83 268 q22 -20 44 0" fill="none" stroke="#5a6b7b" stroke-width="2"/>
  <text x="105" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#15202b">You</text>

  <!-- agent -->
  <rect x="205" y="180" width="120" height="130" rx="14" fill="#f1e9ff" stroke="#7b3fe4" stroke-width="2"/>
  <text x="265" y="222" text-anchor="middle" font-size="16" font-weight="bold" fill="#7b3fe4">AI agent</text>
  <text x="265" y="244" text-anchor="middle" font-size="13" fill="#445566">Claude Desktop /</text>
  <text x="265" y="262" text-anchor="middle" font-size="13" fill="#445566">Claude Code</text>
  <text x="265" y="292" text-anchor="middle" font-size="12" fill="#7b3fe4">narrates the plan</text>

  <!-- you <-> agent -->
  <line x1="170" y1="245" x2="205" y2="245" stroke="#445566" stroke-width="2.5" marker-end="url(#a)" marker-start="url(#a0)"/>
  <text x="188" y="188" text-anchor="middle" font-size="12" fill="#445566">chat</text>

  <!-- mcp server -->
  <rect x="400" y="180" width="260" height="200" rx="14" fill="#e9f1ff" stroke="#1f6feb" stroke-width="2"/>
  <text x="530" y="212" text-anchor="middle" font-size="17" font-weight="bold" fill="#1f6feb">ML Compass MCP server</text>
  <text x="530" y="232" text-anchor="middle" font-size="12" fill="#445566">local · stdio · zero network calls</text>
  <rect x="424" y="248" width="212" height="30" rx="8" fill="#ffffff" stroke="#1f6feb"/>
  <text x="530" y="268" text-anchor="middle" font-size="13" font-family="Courier New, monospace" fill="#15202b">profile_dataset</text>
  <rect x="424" y="286" width="212" height="30" rx="8" fill="#ffffff" stroke="#1f6feb"/>
  <text x="530" y="306" text-anchor="middle" font-size="13" font-family="Courier New, monospace" fill="#15202b">list_questions</text>
  <rect x="424" y="324" width="212" height="30" rx="8" fill="#ffffff" stroke="#1f6feb"/>
  <text x="530" y="344" text-anchor="middle" font-size="13" font-family="Courier New, monospace" fill="#15202b">get_bearing</text>

  <!-- agent <-> server across boundary -->
  <line x1="325" y1="250" x2="400" y2="250" stroke="#1f6feb" stroke-width="2.5" marker-end="url(#b)" marker-start="url(#b0)"/>
  <text x="362" y="238" text-anchor="middle" font-size="12" fill="#1f6feb">MCP (stdio)</text>

  <!-- csv -->
  <rect x="420" y="420" width="150" height="60" rx="10" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
  <text x="495" y="446" text-anchor="middle" font-size="14" font-weight="bold" fill="#15202b">your CSV</text>
  <text x="495" y="466" text-anchor="middle" font-size="12" fill="#445566">read from disk</text>
  <line x1="505" y1="420" x2="518" y2="380" stroke="#5a6b7b" stroke-width="2.5" marker-end="url(#g)"/>

  <!-- engine -->
  <rect x="740" y="180" width="380" height="200" rx="14" fill="#ffffff" stroke="#1d7a3a" stroke-width="2.5"/>
  <text x="930" y="215" text-anchor="middle" font-size="17" font-weight="bold" fill="#1d7a3a">Deterministic rules engine</text>
  <text x="930" y="238" text-anchor="middle" font-size="13" fill="#445566">the same rules.mjs the web app ships</text>
  <rect x="770" y="256" width="320" height="30" rx="8" fill="#e3f6e8"/>
  <text x="930" y="276" text-anchor="middle" font-size="13" fill="#1d7a3a">no LLM inside · works fully offline</text>
  <rect x="770" y="294" width="320" height="30" rx="8" fill="#e3f6e8"/>
  <text x="930" y="314" text-anchor="middle" font-size="13" fill="#1d7a3a">regression-tested on 21 classic datasets · 0 failures</text>
  <text x="930" y="360" text-anchor="middle" font-size="13" fill="#445566">bearing = decision · reason · caveat, per section</text>

  <!-- server <-> engine -->
  <line x1="660" y1="270" x2="740" y2="270" stroke="#1d7a3a" stroke-width="2.5" marker-end="url(#g)" marker-start="url(#g0)"/>

  <!-- steps strip -->
  <rect x="40" y="530" width="1120" height="90" rx="14" fill="#ffffff" stroke="#e3e1da" stroke-width="2"/>
  <g font-size="14" fill="#15202b">
    <circle cx="80" cy="575" r="14" fill="#1f6feb"/><text x="80" y="580" text-anchor="middle" fill="#fff" font-weight="bold">1</text>
    <text x="104" y="570">agent profiles the CSV</text>
    <text x="104" y="590" font-size="12" fill="#445566">objective facts only</text>
    <circle cx="360" cy="575" r="14" fill="#1f6feb"/><text x="360" y="580" text-anchor="middle" fill="#fff" font-weight="bold">2</text>
    <text x="384" y="570">engine lists what the data can't answer</text>
    <text x="384" y="590" font-size="12" fill="#445566">you answer in chat</text>
    <circle cx="700" cy="575" r="14" fill="#1f6feb"/><text x="700" y="580" text-anchor="middle" fill="#fff" font-weight="bold">3</text>
    <text x="724" y="570">rules emit the bearing</text>
    <text x="724" y="590" font-size="12" fill="#445566">structured JSON, deterministic</text>
    <circle cx="960" cy="575" r="14" fill="#1f6feb"/><text x="960" y="580" text-anchor="middle" fill="#fff" font-weight="bold">4</text>
    <text x="984" y="570">agent summarizes</text>
    <text x="984" y="590" font-size="12" fill="#445566">quotes decisions verbatim</text>
  </g>

  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#445566"/></marker>
    <marker id="a0" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 z" fill="#445566"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1f6feb"/></marker>
    <marker id="b0" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 z" fill="#1f6feb"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1d7a3a"/></marker>
    <marker id="g0" markerWidth="9" markerHeight="9" refX="2" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 z" fill="#1d7a3a"/></marker>
  </defs>
</svg>
