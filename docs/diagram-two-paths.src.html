<!doctype html>
<meta charset="utf-8">
<style>body{margin:0}</style>
<svg width="2400" height="1300" viewBox="0 0 1200 650" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1200" height="650" fill="#fbfaf7"/>

  <text x="600" y="50" text-anchor="middle" font-size="30" font-weight="bold" fill="#15202b">Two ways to start an ML project</text>

  <!-- LEFT: the usual way -->
  <rect x="50" y="80" width="520" height="530" rx="18" fill="#ffffff" stroke="#b23b3b" stroke-width="2.5"/>
  <text x="310" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#b23b3b">The usual way</text>

  <g text-anchor="middle" font-size="16">
    <rect x="185" y="140" width="250" height="46" rx="10" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
    <text x="310" y="169" fill="#15202b">Dataset lands</text>
    <line x1="310" y1="186" x2="310" y2="212" stroke="#5a6b7b" stroke-width="2.5" marker-end="url(#n)"/>

    <rect x="185" y="214" width="250" height="46" rx="10" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
    <text x="310" y="243" fill="#15202b">“Which model should I use?”</text>
    <line x1="310" y1="260" x2="310" y2="286" stroke="#5a6b7b" stroke-width="2.5" marker-end="url(#n)"/>

    <rect x="185" y="288" width="250" height="46" rx="10" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
    <text x="310" y="317" fill="#15202b">Train · tune · repeat</text>
    <line x1="310" y1="334" x2="310" y2="360" stroke="#5a6b7b" stroke-width="2.5" marker-end="url(#n)"/>

    <rect x="185" y="362" width="250" height="46" rx="10" fill="#e3f6e8" stroke="#1d7a3a" stroke-width="2"/>
    <text x="310" y="391" fill="#1d7a3a">“97% accurate!”</text>
    <line x1="310" y1="408" x2="310" y2="434" stroke="#b23b3b" stroke-width="2.5" marker-end="url(#r)"/>

    <rect x="130" y="436" width="360" height="52" rx="10" fill="#fbe6e6" stroke="#b23b3b" stroke-width="2.5"/>
    <text x="310" y="468" font-size="17" font-weight="bold" fill="#b23b3b">Production: oops.</text>
  </g>
  <g font-size="13" fill="#b23b3b" text-anchor="middle">
    <text x="310" y="516">the answer was leaked into a feature · accuracy was the wrong yardstick</text>
    <text x="310" y="538">the split trained on the future · it wasn't even a classification problem</text>
  </g>
  <text x="310" y="585" text-anchor="middle" font-size="14" font-style="italic" fill="#445566">Nothing was wrong with the model. The setup was dishonest —</text>
  <text x="310" y="603" text-anchor="middle" font-size="14" font-style="italic" fill="#445566">and every mistake happened before the first training run.</text>

  <!-- RIGHT: with a pre-flight -->
  <rect x="630" y="80" width="520" height="530" rx="18" fill="#ffffff" stroke="#1f6feb" stroke-width="2.5"/>
  <text x="890" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f6feb">With ML Compass</text>

  <g text-anchor="middle" font-size="16">
    <rect x="765" y="140" width="250" height="46" rx="10" fill="#eef1f4" stroke="#5a6b7b" stroke-width="2"/>
    <text x="890" y="169" fill="#15202b">Dataset lands</text>
    <line x1="890" y1="186" x2="890" y2="208" stroke="#1f6feb" stroke-width="2.5" marker-end="url(#b)"/>

    <rect x="765" y="210" width="250" height="46" rx="10" fill="#e9f1ff" stroke="#1f6feb" stroke-width="2"/>
    <text x="890" y="239" fill="#15202b">Profile — the objective facts</text>
    <line x1="890" y1="256" x2="890" y2="278" stroke="#1f6feb" stroke-width="2.5" marker-end="url(#b)"/>

    <rect x="765" y="280" width="250" height="46" rx="10" fill="#e9f1ff" stroke="#1f6feb" stroke-width="2"/>
    <text x="890" y="298" font-size="15" fill="#15202b">Questions the data can't answer</text>
    <text x="890" y="317" font-size="12.5" fill="#445566">incl. “known at prediction time?”</text>
    <line x1="890" y1="326" x2="890" y2="348" stroke="#1f6feb" stroke-width="2.5" marker-end="url(#b)"/>

    <rect x="740" y="350" width="300" height="92" rx="10" fill="#e9f1ff" stroke="#1f6feb" stroke-width="2.5"/>
    <text x="890" y="376" font-weight="bold" fill="#1f6feb">The bearing</text>
    <text x="890" y="398" font-size="13" fill="#15202b">leakage audit · honest metric · honest split</text>
    <text x="890" y="418" font-size="13" fill="#15202b">task framing · baselines → model families</text>
    <line x1="890" y1="442" x2="890" y2="464" stroke="#1d7a3a" stroke-width="2.5" marker-end="url(#g)"/>

    <rect x="765" y="466" width="250" height="46" rx="10" fill="#e3f6e8" stroke="#1d7a3a" stroke-width="2"/>
    <text x="890" y="495" fill="#1d7a3a">Train — with a plan</text>
  </g>
  <text x="890" y="546" text-anchor="middle" font-size="14" fill="#1d7a3a" font-weight="bold">A number you can defend — to the team, the client, the regulator.</text>
  <text x="890" y="585" text-anchor="middle" font-size="14" font-style="italic" fill="#445566">Two minutes, deterministic, regression-tested —</text>
  <text x="890" y="603" text-anchor="middle" font-size="14" font-style="italic" fill="#445566">from the web app or your AI agent (MCP).</text>

  <defs>
    <marker id="n" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#5a6b7b"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#b23b3b"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1f6feb"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1d7a3a"/></marker>
  </defs>
</svg>
